<template id="dashboard-stat-card">
    <div class="stat-card">
        <div class="stat-label">[CARD_TITLE]</div><!-- E.G. Total Billed , Paid Invoices, Overdue Invoices, Recent Activity, Amount Received -->
        <div class="stat-value">[CARD_VALUE]</div><!-- E.G. $10,000, 5, 3, 5, $10,000 -->
        <div class="stat-sub">[NUM_INVOICES]</div><!-- E.G. 5 invoices, 3 PAID, 14, overdue, 1 paid, 3 sent, 4 invoices-->
      </div>
</template>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice — LedgerLite</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <script type="module" src="./js/index.js"></script>
</head>

<body>
    <div id="app">
        <!-- Sidebar -->
        <div id="sidebar">
            <div id="sidebar-logo">
                <div class="customer-name">Sky High Tech</div>
                <div class="sub">Invoicing</div>
            </div>
            <nav>
                <div class="nav-section">Main</div>
                <div class="nav-item active" data-page="dashboard" >
                    <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
                        <rect x="1" y="1" width="6" height="6" rx="1.5" fill="currentColor" />
                        <rect x="9" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity=".6" />
                        <rect x="1" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity=".6" />
                        <rect x="9" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity=".4" />
                    </svg>
                    Dashboard
                </div>
                <div class="nav-item" data-page="invoices" >
                    <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
                        <rect x="2" y="1" width="12" height="14" rx="1.5" stroke="currentColor" stroke-width="1.4" />
                        <line x1="5" y1="5.5" x2="11" y2="5.5" stroke="currentColor" stroke-width="1.2"
                            stroke-linecap="round" />
                        <line x1="5" y1="8" x2="11" y2="8" stroke="currentColor" stroke-width="1.2"
                            stroke-linecap="round" />
                        <line x1="5" y1="10.5" x2="8.5" y2="10.5" stroke="currentColor" stroke-width="1.2"
                            stroke-linecap="round" />
                    </svg>
                    Invoices
                </div>
                <div class="nav-item" data-page="customers" >
                    <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
                        <circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.4" />
                        <path d="M2 13c0-2.761 2.686-5 6-5s6 2.239 6 5" stroke="currentColor" stroke-width="1.4"
                            stroke-linecap="round" />
                    </svg>
                    Customers
                </div>
                <div class="nav-item" data-page="products" >
                    <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
                        <rect x="1.5" y="6" width="13" height="9" rx="1.5" stroke="currentColor" stroke-width="1.4" />
                        <path d="M5 6V4.5a3 3 0 1 1 6 0V6" stroke="currentColor" stroke-width="1.4"
                            stroke-linecap="round" />
                    </svg>
                    Products
                </div>
                <div class="nav-section">Config</div>
                <div class="nav-item" data-page="taxes" >
                    <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
                        <circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.4" /><text x="8" y="11.5"
                            font-size="8" text-anchor="middle" fill="currentColor"
                            font-family="DM Sans,sans-serif">%</text>
                    </svg>
                    Tax Rates
                </div>
                <div class="nav-item" data-page="settings" >
                    <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
                        <circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.4" />
                        <path
                            d="M8 1.5v1M8 13.5v1M1.5 8h1M13.5 8h1M3.4 3.4l.7.7M11.9 11.9l.7.7M12.6 3.4l-.7.7M4.1 11.9l-.7.7"
                            stroke="currentColor" stroke-width="1.3" stroke-linecap="round" />
                    </svg>
                    Settings
                </div>
            </nav>
            <div style="padding:.75rem 1rem 0;border-top:1px solid rgba(255,255,255,.08)">
                <button class="btn btn-secondary btn-sm" onclick="exportData()"
                    style="width:100%;justify-content:center;background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.12);color:rgba(255,255,255,.6);font-size:12px">
                    Export data (JSON)
                </button>
            </div>
        </div>

        <!-- Main -->
        <div id="main">
            <div id="topbar">
                <h2 id="page-title">Dashboard</h2>
                <div id="topbar-actions"></div>
            </div>
            <div id="content"></div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal-overlay" style="display:none" onclick="closeModalOverlay(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 id="modal-title"></h3>
                <button class="close-btn" onclick="closeModal()">&#10005;</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-footer" id="modal-footer"></div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast"></div>
</body>
